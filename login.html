<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RouteCare — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="login-page">
  <a href="/" class="back-link">← Home</a>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🚑</div>
      <span>Route<span style="color:var(--blue)">Care</span></span>
    </div>
    <h2 class="login-title">Welcome back</h2>
    <p class="login-sub">Sign in to access your emergency dashboard</p>
    <div class="toggle-tabs">
      <button class="toggle-tab {% if role=='ambulance' %}active{% endif %}" onclick="setRole('ambulance')" type="button">🚑 Ambulance</button>
      <button class="toggle-tab {% if role=='hospital' %}active{% endif %}" onclick="setRole('hospital')" type="button">🏥 Hospital</button>
    </div>
    {% if error %}<div class="error-msg">⚠️ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="role" id="roleInput" value="{{ role }}"/>
      <div class="form-group">
        <label class="form-label">User ID</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-400)">🪪</span>
          <input type="text" name="user_id" class="form-control" style="padding-left:42px" placeholder="e.g. AMB001 or HSP001" required autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-400)">🔒</span>
          <input type="password" name="password" class="form-control" style="padding-left:42px" placeholder="Enter your password" required autocomplete="current-password"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Sign In →</button>
    </form>
    <div style="background:var(--grey-50);border:1px solid var(--grey-200);border-radius:8px;padding:10px 14px;font-size:.78rem;color:var(--grey-600);margin-top:16px;line-height:1.7">
      <strong>Demo:</strong> AMB001 / pass123 &nbsp;·&nbsp; HSP001 / hosp123
    </div>
    <p style="text-align:center;margin-top:14px;font-size:.83rem;color:var(--grey-400)">
      No account? <a href="/signup" style="color:var(--blue);font-weight:600">Create one →</a>
    </p>
  </div>
</div>
<script>
function setRole(r){
  document.getElementById('roleInput').value=r;
  document.querySelectorAll('.toggle-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
